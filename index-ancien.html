<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GESCOM Avenir</title>
<link rel="manifest" href="data:application/json,{}">
<style>
  :root{
    --bleu:#1a3c5e;
    --bleu-clair:#2c6591;
    --vert:#1e8a4c;
    --rouge:#c0392b;
    --orange:#e67e22;
    --gris-fond:#f2f5f8;
    --gris-bord:#d7dee5;
    --blanc:#ffffff;
    --texte:#22303c;
    --texte-clair:#5a6b7a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    background:var(--gris-fond);
    color:var(--texte);
    overscroll-behavior:none;
  }
  #app{display:flex; flex-direction:column; height:100vh; width:100%; overflow:hidden;}

  /* ---- Header ---- */
  .topbar{
    background:var(--bleu); color:#fff; padding:10px 14px;
    display:flex; align-items:center; justify-content:space-between;
    flex-shrink:0; box-shadow:0 2px 6px rgba(0,0,0,.15); z-index:10;
  }
  .topbar .titre{font-size:16px; font-weight:700; letter-spacing:.3px;}
  .topbar .sous{font-size:11px; opacity:.8; margin-top:1px;}
  .topbar-right{display:flex; align-items:center; gap:10px;}
  .badge-depot{
    background:rgba(255,255,255,.15); padding:5px 10px; border-radius:14px;
    font-size:12px; font-weight:600;
  }
  .btn-icon{
    background:rgba(255,255,255,.15); border:none; color:#fff; border-radius:8px;
    width:34px; height:34px; font-size:16px; cursor:pointer; display:flex;
    align-items:center; justify-content:center;
  }

  /* ---- Alert banner ---- */
  .alert-banner{
    background:#fdecea; color:#c0392b; padding:8px 14px; font-size:13px;
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    border-bottom:1px solid #f5c6c0; flex-shrink:0; cursor:pointer;
  }
  .alert-banner b{font-weight:700;}

  /* ---- Main content ---- */
  #contenu{flex:1; overflow-y:auto; padding:14px; padding-bottom:90px;}

  /* ---- Bottom nav ---- */
  .bottomnav{
    position:fixed; bottom:0; left:0; right:0; background:#fff;
    border-top:1px solid var(--gris-bord); display:flex; z-index:20;
    box-shadow:0 -2px 8px rgba(0,0,0,.06);
    padding-bottom:env(safe-area-inset-bottom);
  }
  .navbtn{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:8px 2px 6px; border:none; background:none; color:var(--texte-clair);
    font-size:10.5px; gap:3px; cursor:pointer;
  }
  .navbtn.actif{color:var(--bleu); font-weight:700;}
  .navbtn .ic{font-size:19px; line-height:1;}

  /* ---- Cards / sections ---- */
  .card{
    background:#fff; border-radius:12px; padding:14px; margin-bottom:12px;
    box-shadow:0 1px 3px rgba(0,0,0,.06); border:1px solid #eef1f4;
  }
  .card-titre{font-size:14px; font-weight:700; color:var(--bleu); margin-bottom:10px; display:flex; align-items:center; justify-content:space-between;}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .grid3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;}

  .stat-box{background:var(--gris-fond); border-radius:10px; padding:12px; text-align:center;}
  .stat-val{font-size:19px; font-weight:800; color:var(--bleu);}
  .stat-val.vert{color:var(--vert);}
  .stat-val.rouge{color:var(--rouge);}
  .stat-lbl{font-size:11px; color:var(--texte-clair); margin-top:2px;}

  h2.titre-page{font-size:17px; font-weight:800; color:var(--bleu); margin:2px 0 12px;}

  /* ---- Forms ---- */
  label{display:block; font-size:12.5px; font-weight:600; color:var(--texte-clair); margin:10px 0 4px;}
  input, select, textarea{
    width:100%; padding:10px 12px; border:1.5px solid var(--gris-bord); border-radius:8px;
    font-size:14.5px; background:#fff; color:var(--texte); font-family:inherit;
  }
  input:focus, select:focus, textarea:focus{outline:none; border-color:var(--bleu-clair);}
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    padding:11px 16px; border-radius:9px; border:none; font-size:14.5px; font-weight:700;
    cursor:pointer; width:100%; margin-top:12px;
  }
  .btn-bleu{background:var(--bleu); color:#fff;}
  .btn-vert{background:var(--vert); color:#fff;}
  .btn-rouge{background:var(--rouge); color:#fff;}
  .btn-orange{background:var(--orange); color:#fff;}
  .btn-gris{background:#e4e9ed; color:var(--texte);}
  .btn-sm{width:auto; padding:7px 12px; font-size:12.5px; margin-top:0;}
  .btn-row{display:flex; gap:8px; margin-top:12px;}
  .btn-row .btn{margin-top:0;}

  /* ---- Lists ---- */
  .liste-item{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:11px 4px; border-bottom:1px solid #eef1f4;
  }
  .liste-item:last-child{border-bottom:none;}
  .li-nom{font-size:14px; font-weight:700; color:var(--texte);}
  .li-sub{font-size:12px; color:var(--texte-clair); margin-top:1px;}
  .li-val{font-size:14px; font-weight:700; text-align:right;}
  .li-val.vert{color:var(--vert);}
  .li-val.rouge{color:var(--rouge);}
  .pill{
    display:inline-block; padding:2px 8px; border-radius:10px; font-size:10.5px; font-weight:700;
  }
  .pill-rouge{background:#fdecea; color:var(--rouge);}
  .pill-vert{background:#e8f6ec; color:var(--vert);}
  .pill-orange{background:#fdf1e4; color:var(--orange);}
  .pill-bleu{background:#e7f0f8; color:var(--bleu);}

  .vide{text-align:center; padding:30px 10px; color:var(--texte-clair); font-size:13.5px;}

  .search-bar{margin-bottom:10px;}

  /* ---- Modal ---- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:100;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .modal-box{
    background:#fff; border-radius:16px 16px 0 0; width:100%; max-width:520px;
    max-height:88vh; overflow-y:auto; padding:16px 16px calc(20px + env(safe-area-inset-bottom));
    animation:slideup .2s ease-out;
  }
  @keyframes slideup{from{transform:translateY(30px); opacity:0;} to{transform:translateY(0); opacity:1;}}
  .modal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;}
  .modal-titre{font-size:16px; font-weight:800; color:var(--bleu);}
  .modal-close{background:none; border:none; font-size:22px; color:var(--texte-clair); cursor:pointer; padding:4px;}

  .ligne-produit{
    display:flex; align-items:center; gap:8px; background:var(--gris-fond); border-radius:8px;
    padding:8px; margin-bottom:6px;
  }
  .ligne-produit .lp-nom{flex:2; font-size:13px; font-weight:600;}
  .ligne-produit input{padding:7px 8px; font-size:13px;}
  .ligne-produit .lp-qte{width:55px;}
  .ligne-produit .lp-prix{width:80px;}
  .lp-suppr{background:none; border:none; color:var(--rouge); font-size:18px; cursor:pointer; padding:4px;}

  .toast{
    position:fixed; bottom:100px; left:50%; transform:translateX(-50%);
    background:var(--texte); color:#fff; padding:10px 18px; border-radius:20px;
    font-size:13px; z-index:200; box-shadow:0 4px 10px rgba(0,0,0,.25);
    animation:fadein .2s;
  }
  @keyframes fadein{from{opacity:0;} to{opacity:1;}}

  .tab-switch{display:flex; background:var(--gris-fond); border-radius:9px; padding:3px; margin-bottom:12px;}
  .tab-switch button{
    flex:1; border:none; background:none; padding:9px 6px; font-size:12.5px; font-weight:700;
    color:var(--texte-clair); border-radius:7px; cursor:pointer;
  }
  .tab-switch button.actif{background:#fff; color:var(--bleu); box-shadow:0 1px 3px rgba(0,0,0,.1);}

  .login-screen{
    height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:linear-gradient(160deg, var(--bleu), var(--bleu-clair)); color:#fff; padding:20px;
  }
  .login-logo{font-size:38px; margin-bottom:6px;}
  .login-titre{font-size:22px; font-weight:800; margin-bottom:2px;}
  .login-sub{font-size:12.5px; opacity:.85; margin-bottom:24px;}
  .pin-dots{display:flex; gap:12px; margin-bottom:22px;}
  .pin-dot{width:16px; height:16px; border-radius:50%; border:2px solid #fff; background:transparent;}
  .pin-dot.plein{background:#fff;}
  .pin-pad{display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; width:100%; max-width:280px;}
  .pin-key{
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.3); color:#fff;
    border-radius:50%; aspect-ratio:1; font-size:20px; font-weight:700; cursor:pointer;
  }
  .pin-key:active{background:rgba(255,255,255,.3);}
  .login-liste-users{margin-top:18px; font-size:12px; opacity:.8; text-align:center;}

  .empty-icon{font-size:34px; margin-bottom:6px; opacity:.6;}

  .journal-item{border-left:3px solid var(--bleu-clair); padding:6px 10px; margin-bottom:8px; font-size:12.5px;}
  .journal-date{color:var(--texte-clair); font-size:11px;}

  ::-webkit-scrollbar{width:0; height:0;}
</style>
</head>
<body>
<div id="app"></div>
<div id="modal-root"></div>
<div id="toast-root"></div>

<script id="app-script">
/* === GESCOM AVENIR — logique applicative === */

/* ---------- Utilitaires ---------- */
const LS_PREFIX = "gescom_";
function lsGet(key, def){
  try{ const v = localStorage.getItem(LS_PREFIX+key); return v ? JSON.parse(v) : def; }
  catch(e){ return def; }
}
function lsSet(key, val){ localStorage.setItem(LS_PREFIX+key, JSON.stringify(val)); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function fcfa(n){
  n = Math.round(Number(n)||0);
  return n.toLocaleString('fr-FR').replace(/\u202f|\u00a0/g,' ') + " FCFA";
}
function dateAuj(){ return new Date().toISOString().slice(0,10); }
function dateAffiche(iso){
  if(!iso) return "";
  const d = new Date(iso+"T00:00:00");
  const jours = ["dim","lun","mar","mer","jeu","ven","sam"];
  const mois = ["jan","fév","mar","avr","mai","juin","juil","aoû","sep","oct","nov","déc"];
  return jours[d.getDay()]+" "+d.getDate()+" "+mois[d.getMonth()];
}
function heureMaintenant(){
  const d = new Date();
  return d.getHours().toString().padStart(2,'0')+":"+d.getMinutes().toString().padStart(2,'0');
}
function toast(msg){
  const root = document.getElementById('toast-root');
  root.innerHTML = '<div class="toast">'+msg+'</div>';
  setTimeout(()=>{ root.innerHTML=''; }, 2200);
}
function esc(s){
  return (s||"").toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------- État global en mémoire (synchronisé avec localStorage) ---------- */
const DB = {
  get depots(){ return lsGet('depots', []); },
  set depots(v){ lsSet('depots', v); },
  get articles(){ return lsGet('articles', []); },
  set articles(v){ lsSet('articles', v); },
  get tiers(){ return lsGet('tiers', []); },
  set tiers(v){ lsSet('tiers', v); },
  get achats(){ return lsGet('achats', []); },
  set achats(v){ lsSet('achats', v); },
  get ventes(){ return lsGet('ventes', []); },
  set ventes(v){ lsSet('ventes', v); },
  get transferts(){ return lsGet('transferts', []); },
  set transferts(v){ lsSet('transferts', v); },
  get caisse(){ return lsGet('caisse', []); },
  set caisse(v){ lsSet('caisse', v); },
  get users(){ return lsGet('users', []); },
  set users(v){ lsSet('users', v); },
  get journal(){ return lsGet('journal', []); },
  set journal(v){ lsSet('journal', v); },
  get reglements(){ return lsGet('reglements', []); },
  set reglements(v){ lsSet('reglements', v); },
  get retours(){ return lsGet('retours', []); },
  set retours(v){ lsSet('retours', v); },
  get avances(){ return lsGet('avances', []); },
  set avances(v){ lsSet('avances', v); },
  get avancesUtilisees(){ return lsGet('avancesUtilisees', []); },
  set avancesUtilisees(v){ lsSet('avancesUtilisees', v); },
  get devis(){ return lsGet('devis', []); },
  set devis(v){ lsSet('devis', v); },
  get params(){ return lsGet('params', {nomEntreprise:"Mon Entreprise", devise:"FCFA"}); },
  set params(v){ lsSet('params', v); },
};

function ajouterJournal(action){
  const j = DB.journal;
  j.unshift({id:uid(), date:dateAuj(), heure:heureMaintenant(), utilisateur:(SESSION.user?SESSION.user.nom:"?"), action});
  if(j.length>500) j.length = 500;
  DB.journal = j;
}

/* ---------- Session ---------- */
const SESSION = { user:null, depotActif:null };

/* ---------- Initialisation des données de base si vide ---------- */
function initDonneesBase(){
  if(DB.users.length===0){
    DB.users = [{id:uid(), pin:"1234", nom:"Administrateur", role:"admin"}];
  }
  if(DB.depots.length===0){
    DB.depots = [{id:uid(), nom:"Dépôt principal"}];
  }
}

/* ---------- Calcul du stock / PAMP par article et dépôt ---------- */
// article.stocks = { [depotId]: { qte: number, pamp: number } }
function getStockDepot(article, depotId){
  return (article.stocks && article.stocks[depotId]) ? article.stocks[depotId] : {qte:0, pamp:0};
}
function getStockTotal(article){
  if(!article.stocks) return {qte:0, valeur:0};
  let qte=0, valeur=0;
  Object.values(article.stocks).forEach(s=>{ qte+=s.qte; valeur += s.qte*s.pamp; });
  return {qte, valeur};
}
function appliquerEntreeStock(article, depotId, qteEntree, prixUnitaire){
  if(!article.stocks) article.stocks = {};
  const actuel = article.stocks[depotId] || {qte:0, pamp:0};
  const nouvelleQte = actuel.qte + qteEntree;
  const nouveauPamp = nouvelleQte>0
    ? ((actuel.qte*actuel.pamp) + (qteEntree*prixUnitaire)) / nouvelleQte
    : 0;
  article.stocks[depotId] = {qte:nouvelleQte, pamp: Math.round(nouveauPamp*100)/100};
}
function appliquerSortieStock(article, depotId, qteSortie){
  if(!article.stocks) article.stocks = {};
  const actuel = article.stocks[depotId] || {qte:0, pamp:0};
  const nouvelleQte = Math.max(0, actuel.qte - qteSortie);
  article.stocks[depotId] = {qte:nouvelleQte, pamp: actuel.pamp}; // PAMP inchangé à la sortie
}

/* ---------- Recherche d'entités ---------- */
function trouverArticle(id){ return DB.articles.find(a=>a.id===id); }
function trouverTiers(id){ return DB.tiers.find(t=>t.id===id); }
function trouverDepot(id){ return DB.depots.find(d=>d.id===id); }
function nomDepot(id){ const d=trouverDepot(id); return d?d.nom:"—"; }
function nomTiers(id){ const t=trouverTiers(id); return t?t.nom:"—"; }

/* ---------- Articles sous stock minimum ---------- */
function articlesAlerte(){
  return DB.articles.filter(a=>{
    const {qte} = getStockTotal(a);
    return (a.stockMin!=null && a.stockMin>0) && qte <= a.stockMin;
  });
}

/* ================= ECRAN DE CONNEXION (PIN) ================= */
let pinSaisi = "";
function renderLogin(){
  pinSaisi = "";
  const users = DB.users;
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="login-screen">
      <div class="login-logo">🏬</div>
      <div class="login-titre">GESCOM Avenir</div>
      <div class="login-sub">Gestion commerciale hors-ligne — ${esc(DB.params.nomEntreprise)}</div>
      <div class="pin-dots" id="pin-dots"></div>
      <div class="pin-pad">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="pin-key" onclick="pinAjouter('${n}')">${n}</button>`).join('')}
        <button class="pin-key" onclick="pinEffacer()">⌫</button>
        <button class="pin-key" onclick="pinAjouter('0')">0</button>
        <div></div>
      </div>
      <div class="login-liste-users">${users.length} utilisateur(s) enregistré(s) · PIN à 4 chiffres</div>
    </div>
  `;
  dessinerPinDots();
}
function dessinerPinDots(){
  const el = document.getElementById('pin-dots');
  if(!el) return;
  el.innerHTML = [0,1,2,3].map(i=>`<div class="pin-dot ${i<pinSaisi.length?'plein':''}"></div>`).join('');
}
function pinAjouter(chiffre){
  if(pinSaisi.length>=4) return;
  pinSaisi += chiffre;
  dessinerPinDots();
  if(pinSaisi.length===4){
    setTimeout(()=>verifierPin(), 150);
  }
}
function pinEffacer(){
  pinSaisi = pinSaisi.slice(0,-1);
  dessinerPinDots();
}
function verifierPin(){
  const user = DB.users.find(u=>u.pin===pinSaisi);
  if(user){
    SESSION.user = user;
    SESSION.depotActif = DB.depots[0] ? DB.depots[0].id : null;
    ajouterJournal("Connexion");
    renderApp();
  }else{
    toast("PIN incorrect");
    pinSaisi = "";
    dessinerPinDots();
  }
}
function deconnexion(){
  ajouterJournal("Déconnexion");
  SESSION.user = null;
  renderLogin();
}

/* ================= STRUCTURE PRINCIPALE (après connexion) ================= */
let ongletActif = "accueil";
const ONGLETS = [
  {id:"accueil", icone:"🏠", label:"Accueil"},
  {id:"stock", icone:"📦", label:"Stock"},
  {id:"achats", icone:"🛒", label:"Achats"},
  {id:"ventes", icone:"💰", label:"Ventes"},
  {id:"caisse", icone:"🧾", label:"Caisse"},
  {id:"plus", icone:"☰", label:"Plus"},
];

function renderApp(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="topbar">
      <div>
        <div class="titre">${esc(DB.params.nomEntreprise)}</div>
        <div class="sous">👤 ${esc(SESSION.user.nom)}</div>
      </div>
      <div class="topbar-right">
        <div class="badge-depot" onclick="ouvrirSelectDepot()">📍 ${esc(nomDepot(SESSION.depotActif))} ▾</div>
        <button class="btn-icon" onclick="deconnexion()">⏻</button>
      </div>
    </div>
    <div id="alerte-zone"></div>
    <div id="contenu"></div>
    <div class="bottomnav" id="bottomnav"></div>
  `;
  dessinerAlerte();
  dessinerNav();
  naviguer(ongletActif);
}
function dessinerAlerte(){
  const zone = document.getElementById('alerte-zone');
  const alertes = articlesAlerte();
  if(alertes.length===0){ zone.innerHTML=""; return; }
  zone.innerHTML = `
    <div class="alert-banner" onclick="naviguer('stock')">
      <span>⚠️ <b>${alertes.length}</b> article(s) en stock minimum atteint</span>
      <span>Voir →</span>
    </div>
  `;
}
function dessinerNav(){
  const nav = document.getElementById('bottomnav');
  nav.innerHTML = ONGLETS.map(o=>`
    <button class="navbtn ${o.id===ongletActif?'actif':''}" onclick="naviguer('${o.id}')">
      <span class="ic">${o.icone}</span><span>${o.label}</span>
    </button>
  `).join('');
}
function naviguer(id){
  ongletActif = id;
  dessinerNav();
  dessinerAlerte();
  const c = document.getElementById('contenu');
  c.scrollTop = 0;
  switch(id){
    case "accueil": renderAccueil(c); break;
    case "stock": renderStock(c); break;
    case "achats": renderAchats(c); break;
    case "ventes": renderVentes(c); break;
    case "caisse": renderCaisse(c); break;
    case "plus": renderPlus(c); break;
    case "tiers": renderTiers(c); break;
    case "transferts": renderTransferts(c); break;
    case "creances": renderCreances(c); break;
    case "avances": renderAvances(c); break;
    case "devis": renderDevisEcran(c); break;
    case "etats": renderEtats(c); break;
    case "parametres": renderParametres(c); break;
    case "journal": renderJournalEcran(c); break;
    default: c.innerHTML = "";
  }
}
function ouvrirSelectDepot(){
  const depots = DB.depots;
  ouvrirModal("Choisir le dépôt actif", `
    <div>
      ${depots.map(d=>`
        <div class="liste-item" style="cursor:pointer" onclick="choisirDepot('${d.id}')">
          <div class="li-nom">📍 ${esc(d.nom)}</div>
          ${d.id===SESSION.depotActif?'<span class="pill pill-bleu">Actif</span>':''}
        </div>
      `).join('')}
    </div>
  `);
}
function choisirDepot(id){
  SESSION.depotActif = id;
  fermerModal();
  renderApp();
  toast("Dépôt actif : "+nomDepot(id));
}

/* ================= MODAL GENERIQUE ================= */
function ouvrirModal(titre, contenuHtml){
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this) fermerModal()">
      <div class="modal-box">
        <div class="modal-head">
          <div class="modal-titre">${esc(titre)}</div>
          <button class="modal-close" onclick="fermerModal()">✕</button>
        </div>
        ${contenuHtml}
      </div>
    </div>
  `;
}
function fermerModal(){
  document.getElementById('modal-root').innerHTML = "";
}

/* ================= ECRAN ACCUEIL ================= */
function renderAccueil(c){
  const articles = DB.articles;
  const {valeurStockTotal} = (()=>{ let v=0; articles.forEach(a=>v+=getStockTotal(a).valeur); return {valeurStockTotal:v}; })();
  const aujourdhui = dateAuj();

        </div>
      `).join('')}
    </div>` : ''}
  `;
}
function calculerSoldeCaisse(){
  const soldes = {};
  CANAUX_CAISSE.forEach(ch=>soldes[ch.id]=0);
  DB.caisse.forEach(m=>{
    const signe = m.type==='entree' ? 1 : -1;
    if(soldes[m.mode]!==undefined) soldes[m.mode] += signe*m.montant;
  });
  const total = Object.values(soldes).reduce((s,v)=>s+v,0);
  return {...soldes, especes:soldes.especes, orange:soldes.orange_money, moov:soldes.moov_money, total};
}

    appliquerSortieStock(a, depotId, l.qte);

  DB.articles = articles;

  const vente = {id:uid(), date:dateAuj(), heure:heureMaintenant(), clientId, depotId, lignes:JSON.parse(JSON.stringify(panierVente)), total, modePaiement};
  DB.ventes = [...DB.ventes, vente];

  // Mouvement de caisse automatique (sauf si crédit)
  if(modePaiement!=='credit'){
    DB.caisse = [...DB.caisse, {id:uid(), date:dateAuj(), heure:heureMaintenant(), type:'entree', montant:total, mode:modePaiement, description:"Vente #"+vente.id.slice(-5), refVenteId:vente.id}];
  }

  ajouterJournal("Vente enregistrée: "+fcfa(total));

  if(window.__devisEnCoursTransformation){
    let devisListe = DB.devis;
    const d = devisListe.find(x=>x.id===window.__devisEnCoursTransformation);
    if(d) d.statut = 'transforme';
    DB.devis = devisListe;
    window.__devisEnCoursTransformation = null;
  }

}

function exporterSauvegarde(){
  const data = {
    depots:DB.depots, articles:DB.articles, tiers:DB.tiers, achats:DB.achats,
    ventes:DB.ventes, transferts:DB.transferts, caisse:DB.caisse, users:DB.users,
    journal:DB.journal, params:DB.params, exportLe:new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = "gescom_sauvegarde_"+dateAuj()+".json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  toast("Sauvegarde téléchargée");
}
function importerSauvegarde(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = JSON.parse(e.target.result);
      if(!confirm("Ceci va remplacer toutes les données actuelles. Continuer ?")) return;
      DB.depots=data.depots||[]; DB.articles=data.articles||[]; DB.tiers=data.tiers||[];
      DB.achats=data.achats||[]; DB.ventes=data.ventes||[]; DB.transferts=data.transferts||[];
      DB.caisse=data.caisse||[]; DB.users=data.users||[]; DB.journal=data.journal||[];
      DB.params=data.params||DB.params;
      toast("Sauvegarde restaurée");
      renderApp();
    }catch(err){ toast("Fichier invalide"); }
  };
  reader.readAsText(file);
}

/* ================= CREANCES (suivi et règlement des ventes à crédit) ================= */
function reglementsDeVente(venteId){
  return DB.reglements.filter(r=>r.venteId===venteId);
}
function montantRegleVente(venteId){
  return reglementsDeVente(venteId).reduce((s,r)=>s+r.montant,0);
}
function montantRetourVente(venteId){
  return DB.retours.filter(r=>r.venteId===venteId).reduce((s,r)=>s+r.montant,0);
}
function qteRetourneeLigne(venteId, articleId){
  return DB.retours.filter(r=>r.venteId===venteId && r.articleId===articleId).reduce((s,r)=>s+r.qte,0);
}
function resteAPayerVente(vente){
  return Math.max(0, vente.total - montantRegleVente(vente.id) - montantRetourVente(vente.id));
}
function ventesCreditNonSoldees(){
  return DB.ventes.filter(v=>v.modePaiement==='credit' && resteAPayerVente(v)>0);
}
function creancesParClient(){
  const map = {};
  ventesCreditNonSoldees().forEach(v=>{
    const cle = v.clientId || "__comptoir__";
    if(!map[cle]) map[cle] = {clientId:v.clientId, total:0, ventes:[]};
    const reste = resteAPayerVente(v);
    map[cle].total += reste;
    map[cle].ventes.push({vente:v, reste});
  });
  return Object.values(map).sort((a,b)=>b.total-a.total);
}

function renderCreances(c){
  const groupes = creancesParClient();
  const totalGeneral = groupes.reduce((s,g)=>s+g.total,0);
  c.innerHTML = `
    <h2 class="titre-page">Créances (ventes à crédit)</h2>
    <div class="card" style="background:var(--gris-fond)">
      <div class="liste-item"><div class="li-nom">Total dû par les clients</div><div class="li-val rouge">${fcfa(totalGeneral)}</div></div>
    </div>

      ${groupes.length===0?`<div class="vide"><div class="empty-icon">📝</div>Aucune créance en cours. 👍</div>`:
        groupes.map(g=>`
        <div class="liste-item" style="cursor:pointer" onclick="ouvrirDetailCreanceClient('${g.clientId||''}')">
          <div>
            <div class="li-nom">${g.clientId ? esc(nomTiers(g.clientId)) : "Client(s) comptoir"}</div>
            <div class="li-sub">${g.ventes.length} vente(s) impayée(s)</div>

  `;
}
function ouvrirDetailCreanceClient(clientId){
  const groupes = creancesParClient();
  const g = groupes.find(x=>(x.clientId||'')===(clientId||''));
  if(!g) return;
  ouvrirModal(clientId?nomTiers(clientId):"Client(s) comptoir", `
    <div>
      ${g.ventes.map(({vente, reste})=>`
        <div class="card" style="background:var(--gris-fond); margin-bottom:8px;">
          <div class="liste-item">
            <div><div class="li-nom">Vente du ${dateAffiche(vente.date)}</div><div class="li-sub">Total: ${fcfa(vente.total)} · Déjà réglé: ${fcfa(montantRegleVente(vente.id))}</div></div>
            <div class="li-val rouge">${fcfa(reste)}</div>
          </div>
          <button class="btn btn-vert btn-sm" style="width:100%; margin-top:8px;" onclick="ouvrirFormReglement('${vente.id}')">💵 Enregistrer un règlement</button>
        </div>
      `).join('')}
    </div>
  `);
}
function ouvrirFormReglement(venteId){
  const vente = DB.ventes.find(v=>v.id===venteId);
  const reste = resteAPayerVente(vente);
  ouvrirModal("Règlement de créance", `
    <div>
      <div class="card" style="background:var(--gris-fond)">
        <div class="liste-item"><div class="li-nom">Reste à payer</div><div class="li-val rouge">${fcfa(reste)}</div></div>
      </div>
      <label>Montant reçu (FCFA) *</label>
      <input id="rg-montant" type="number" value="${reste}">
      <label>Mode de paiement</label>
      <select id="rg-mode">${optionsMoyensPaiement(false)}</select>
      <button class="btn btn-vert" onclick="validerReglement('${venteId}')">✅ Enregistrer le règlement</button>
    </div>
  `);
}
function validerReglement(venteId){
  const vente = DB.ventes.find(v=>v.id===venteId);
  const reste = resteAPayerVente(vente);
  const montant = Number(document.getElementById('rg-montant').value)||0;
  const mode = document.getElementById('rg-mode').value;
  if(montant<=0){ toast("Montant invalide"); return; }
  if(montant>reste){ toast("Le montant dépasse le reste à payer ("+fcfa(reste)+")"); return; }

  DB.reglements = [...DB.reglements, {id:uid(), date:dateAuj(), heure:heureMaintenant(), venteId, clientId:vente.clientId, montant, mode}];
  DB.caisse = [...DB.caisse, {id:uid(), date:dateAuj(), heure:heureMaintenant(), type:'entree', montant, mode, description:"Règlement créance #"+venteId.slice(-5)}];
  ajouterJournal("Règlement créance: "+fcfa(montant)+" ("+labelMode(mode)+")");
  fermerModal();
  naviguer('creances');
  toast("Règlement enregistré");
}

/* ================= RETOURS CLIENTS ================= */
function ouvrirRetourVente(venteId){
  const vente = DB.ventes.find(v=>v.id===venteId);
  const lignesDisponibles = vente.lignes.map(l=>{
    const a = trouverArticle(l.articleId);
    const dejaRetourne = qteRetourneeLigne(venteId, l.articleId);
    return {...l, nom: a?a.designation:'—', maxRetour: l.qte - dejaRetourne};
  }).filter(l=>l.maxRetour>0);

  if(lignesDisponibles.length===0){ toast("Tous les articles de cette vente ont déjà été retournés"); return; }

  ouvrirModal("Retour client", `
    <div>
      <div style="font-size:12.5px; color:var(--texte-clair); margin-bottom:8px;">Vente du ${dateAffiche(vente.date)} — sélectionnez les quantités retournées</div>
      ${lignesDisponibles.map((l,i)=>`
        <div class="ligne-produit">
          <div class="lp-nom">${esc(l.nom)} <span style="color:var(--texte-clair)">(max ${l.maxRetour})</span></div>
          <input class="lp-qte" type="number" id="ret-qte-${l.articleId}" value="0" min="0" max="${l.maxRetour}">
          <div style="width:80px; font-size:12px; text-align:right;">${fcfa(l.prixUnitaire)}</div>
        </div>
      `).join('')}
      ${vente.modePaiement!=='credit'?`
      <label>Mode de remboursement</label>
      <select id="ret-mode">${optionsMoyensPaiement(false)}</select>
      `:`<div style="font-size:12.5px; color:var(--texte-clair); margin-top:10px;">Cette vente était à crédit : le retour réduira simplement le montant dû, sans sortie de caisse.</div>`}
      <button class="btn btn-orange" onclick="validerRetour('${venteId}')">✅ Valider le retour</button>
    </div>
  `);
}
function validerRetour(venteId){
  const vente = DB.ventes.find(v=>v.id===venteId);
  let articles = DB.articles;
  let retours = DB.retours;
  let montantTotal = 0;
  let auMoinsUn = false;

  vente.lignes.forEach(l=>{
    const input = document.getElementById('ret-qte-'+l.articleId);
    if(!input) return;
    const qte = Number(input.value)||0;
    if(qte<=0) return;
    const dejaRetourne = qteRetourneeLigne(venteId, l.articleId);
    if(qte > (l.qte - dejaRetourne)){ toast("Quantité de retour trop élevée"); return; }
    auMoinsUn = true;
    const montant = qte * l.prixUnitaire;
    montantTotal += montant;

    const a = articles.find(x=>x.id===l.articleId);
    const pampActuel = getStockDepot(a, vente.depotId).pamp || l.prixUnitaire;
    appliquerEntreeStock(a, vente.depotId, qte, pampActuel);

    retours.push({id:uid(), date:dateAuj(), heure:heureMaintenant(), venteId, articleId:l.articleId, qte, montant});
  });

  if(!auMoinsUn){ toast("Indiquez au moins une quantité à retourner"); return; }

  DB.articles = articles;
  DB.retours = retours;

  if(vente.modePaiement!=='credit'){
    const mode = document.getElementById('ret-mode').value;
    DB.caisse = [...DB.caisse, {id:uid(), date:dateAuj(), heure:heureMaintenant(), type:'sortie', montant:montantTotal, mode, description:"Remboursement retour #"+venteId.slice(-5)}];
  }

  ajouterJournal("Retour client: "+fcfa(montantTotal));
  fermerModal();
  naviguer('ventes');
  toast("Retour enregistré, stock remis à jour");
}

/* ================= RECU / TICKET ================= */
function genererTexteRecu(vente){
  const p = DB.params;
  let lignes = `${p.nomEntreprise}\n`;
  lignes += `------------------------------\n`;
  lignes += `Date: ${dateAffiche(vente.date)} ${vente.heure}\n`;
  lignes += `Client: ${vente.clientId?nomTiers(vente.clientId):'Comptoir'}\n`;
  lignes += `------------------------------\n`;
  vente.lignes.forEach(l=>{
    const a = trouverArticle(l.articleId);
    lignes += `${a?a.designation:'—'} x${l.qte} = ${fcfa(l.qte*l.prixUnitaire)}\n`;
  });
  lignes += `------------------------------\n`;
  lignes += `TOTAL: ${fcfa(vente.total)}\n`;
  lignes += `Paiement: ${labelMode(vente.modePaiement)}\n`;
  const reste = resteAPayerVente(vente);
  if(vente.modePaiement==='credit' && reste>0) lignes += `Reste à payer: ${fcfa(reste)}\n`;
  lignes += `------------------------------\n`;
  lignes += `Merci de votre confiance !`;
  return lignes;
}
function ouvrirRecu(venteId){
  const vente = DB.ventes.find(v=>v.id===venteId);
  const texte = genererTexteRecu(vente);
  ouvrirModal("Reçu de vente", `
    <div>
      <pre style="background:var(--gris-fond); padding:12px; border-radius:8px; font-size:12.5px; white-space:pre-wrap; font-family:monospace;">${esc(texte)}</pre>
      <div class="btn-row">
        <button class="btn btn-bleu" onclick="imprimerRecu('${venteId}')">🖨️ Imprimer</button>
        <button class="btn btn-vert" onclick="partagerRecuWhatsapp('${venteId}')">📤 WhatsApp</button>
      </div>
    </div>
  `);
}
function imprimerRecu(venteId){
  const vente = DB.ventes.find(v=>v.id===venteId);
  const texte = genererTexteRecu(vente);
  const w = window.open('', '_blank');
  w.document.write(`<pre style="font-family:monospace; font-size:13px; white-space:pre-wrap;">${esc(texte)}</pre>`);
  w.document.close();
  w.print();
}
function partagerRecuWhatsapp(venteId){
  const vente = DB.ventes.find(v=>v.id===venteId);
  const texte = genererTexteRecu(vente);
  const url = "https://wa.me/?text=" + encodeURIComponent(texte);
  window.open(url, '_blank');
}

/* ================= AVANCES / ACOMPTES CLIENTS ================= */
function soldeAvanceClient(clientId){
  const recu = DB.avances.filter(a=>a.clientId===clientId).reduce((s,a)=>s+a.montant,0);
  const utilise = DB.avancesUtilisees.filter(a=>a.clientId===clientId).reduce((s,a)=>s+a.montant,0);
  return recu - utilise;
}
function renderAvances(c){
  const clients = DB.tiers.filter(t=>t.type==='client');
  const avecSolde = clients.map(cl=>({client:cl, solde:soldeAvanceClient(cl.id)})).filter(x=>x.solde>0 || DB.avances.some(a=>a.clientId===x.client.id));
  c.innerHTML = `
    <h2 class="titre-page">Avances & acomptes clients</h2>
    <button class="btn btn-bleu" onclick="ouvrirFormAvance()">➕ Enregistrer une avance reçue</button>
    <div class="card" style="margin-top:12px;">
      ${avecSolde.length===0?`<div class="vide"><div class="empty-icon">💰</div>Aucune avance enregistrée.</div>`:
        avecSolde.map(x=>`
        <div class="liste-item">
          <div class="li-nom">${esc(x.client.nom)}</div>
          <div class="li-val ${x.solde>0?'vert':''}">${fcfa(x.solde)}</div>
        </div>
      `).join('')}
    </div>
  `;
}
function ouvrirFormAvance(){
  const clients = DB.tiers.filter(t=>t.type==='client');
  if(clients.length===0){ toast("Créez d'abord un client (dans Tiers)"); return; }
  ouvrirModal("Nouvelle avance reçue", `
    <div>
      <label>Client *</label>
      <select id="av-client">${clients.map(cl=>`<option value="${cl.id}">${esc(cl.nom)}</option>`).join('')}</select>
      <label>Montant reçu (FCFA) *</label>
      <input id="av-montant" type="number" placeholder="Ex: 20000">
      <label>Mode de réception</label>
      <select id="av-mode">${optionsMoyensPaiement(false)}</select>
      <label>Note (optionnel)</label>
      <input id="av-note" placeholder="Ex: Acompte commande fer à béton">
      <button class="btn btn-vert" onclick="validerAvance()">✅ Enregistrer</button>
    </div>
  `);
}
function validerAvance(){
  const clientId = document.getElementById('av-client').value;
  const montant = Number(document.getElementById('av-montant').value)||0;
  const mode = document.getElementById('av-mode').value;
  const note = document.getElementById('av-note').value.trim();
  if(montant<=0){ toast("Montant invalide"); return; }
  DB.avances = [...DB.avances, {id:uid(), date:dateAuj(), heure:heureMaintenant(), clientId, montant, mode, description:note}];
  DB.caisse = [...DB.caisse, {id:uid(), date:dateAuj(), heure:heureMaintenant(), type:'entree', montant, mode, description:"Avance reçue de "+nomTiers(clientId)}];
  ajouterJournal("Avance reçue: "+fcfa(montant)+" de "+nomTiers(clientId));
  fermerModal();
  naviguer('avances');
  toast("Avance enregistrée");
}

/* ================= DEVIS ================= */
let panierDevis = [];
function renderDevisEcran(c){
  const devis = [...DB.devis].sort((a,b)=> (b.date+b.heure).localeCompare(a.date+a.heure));
  c.innerHTML = `
    <h2 class="titre-page">Devis</h2>
    <button class="btn btn-bleu" onclick="ouvrirNouveauDevis()">➕ Nouveau devis</button>
    <div class="card" style="margin-top:12px;">
      ${devis.length===0?`<div class="vide"><div class="empty-icon">📋</div>Aucun devis enregistré.</div>`:
        devis.map(d=>`
        <div class="liste-item">
          <div style="flex:1">
            <div class="li-nom">${d.clientId?esc(nomTiers(d.clientId)):'Client comptoir'} <span class="pill ${d.statut==='transforme'?'pill-vert':(d.statut==='annule'?'pill-rouge':'pill-orange')}">${d.statut==='transforme'?'Transformé':(d.statut==='annule'?'Annulé':'En attente')}</span></div>
            <div class="li-sub">${dateAffiche(d.date)} · ${d.lignes.length} article(s)</div>
            ${d.statut==='en_attente'?`<button class="btn btn-sm btn-vert" style="margin-top:6px;" onclick="transformerDevisEnVente('${d.id}')">✅ Transformer en vente</button>`:''}
          </div>
          <div class="li-val">${fcfa(d.total)}</div>
        </div>
      `).join('')}
    </div>
  `;
}
function ouvrirNouveauDevis(){
  panierDevis = [];
  dessinerModalDevis();
}
function dessinerModalDevis(){
  const clients = DB.tiers.filter(t=>t.type==='client');
  const articles = DB.articles;
  const total = panierDevis.reduce((s,l)=>s+l.qte*l.prixUnitaire,0);
  ouvrirModal("Nouveau devis", `
    <div>
      <label>Client</label>
      <select id="dv-client">
        <option value="">— Client comptoir —</option>
        ${clients.map(cl=>`<option value="${cl.id}">${esc(cl.nom)}</option>`).join('')}
      </select>
      <label>Ajouter un article</label>
      <select id="dv-select-article" onchange="ajouterLigneDevis()">
        <option value="">— Choisir un article —</option>
        ${articles.map(a=>`<option value="${a.id}">${esc(a.designation)}</option>`).join('')}
      </select>
      <div id="dv-lignes" style="margin-top:10px;">
        ${panierDevis.map((l,i)=>{
          const a = trouverArticle(l.articleId);
          return `
          <div class="ligne-produit">
            <div class="lp-nom">${esc(a.designation)}</div>
            <input class="lp-qte" type="number" value="${l.qte}" onchange="maj_qte_devis(${i}, this.value)" placeholder="Qté">
            <input class="lp-prix" type="number" value="${l.prixUnitaire}" onchange="maj_prix_devis(${i}, this.value)" placeholder="Prix U.">
            <button class="lp-suppr" onclick="suppr_ligne_devis(${i})">✕</button>
          </div>`;
        }).join('')}
      </div>
      <div class="card" style="margin-top:10px; background:var(--gris-fond)">
        <div class="liste-item"><div class="li-nom">Total devis</div><div class="li-val">${fcfa(total)}</div></div>
      </div>
      <button class="btn btn-bleu" onclick="validerDevis()">✅ Enregistrer le devis</button>
    </div>
  `);
}
function ajouterLigneDevis(){
  const sel = document.getElementById('dv-select-article');
  const id = sel.value;
  if(!id) return;
  const a = trouverArticle(id);
  if(panierDevis.find(l=>l.articleId===id)){ toast("Déjà dans la liste"); sel.value=""; return; }
  panierDevis.push({articleId:id, qte:1, prixUnitaire:a.prixVente||0});
  sel.value="";
  dessinerModalDevis();
}
function maj_qte_devis(i,v){ panierDevis[i].qte = Number(v)||0; dessinerModalDevis(); }
function maj_prix_devis(i,v){ panierDevis[i].prixUnitaire = Number(v)||0; dessinerModalDevis(); }
function suppr_ligne_devis(i){ panierDevis.splice(i,1); dessinerModalDevis(); }
function validerDevis(){
  if(panierDevis.length===0){ toast("Ajoutez au moins un article"); return; }
  const clientId = document.getElementById('dv-client').value || null;
  const total = panierDevis.reduce((s,l)=>s+l.qte*l.prixUnitaire,0);
  const devis = {id:uid(), date:dateAuj(), heure:heureMaintenant(), clientId, lignes:JSON.parse(JSON.stringify(panierDevis)), total, statut:'en_attente'};
  DB.devis = [...DB.devis, devis];
  ajouterJournal("Devis créé: "+fcfa(total));
  fermerModal();
  panierDevis = [];
  naviguer('devis');
  toast("Devis enregistré");
}
function transformerDevisEnVente(devisId){
  const devis = DB.devis.find(d=>d.id===devisId);
  panierVente = JSON.parse(JSON.stringify(devis.lignes));
  dessinerModalVente();
  setTimeout(()=>{
    const clSel = document.getElementById('vte-client');
    if(clSel && devis.clientId) clSel.value = devis.clientId;
  }, 30);
  // Marquer transformé une fois la vente validée : on le fait via un flag temporaire
  window.__devisEnCoursTransformation = devisId;
}

/* ================= DEMARRAGE ================= */
initDonneesBase();
if(SESSION.user){ renderApp(); } else { renderLogin(); }
</script>
